<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Q&A Live – Dotazy přes QR</title>

  <!-- Lucide (icons) -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- QRCode generator -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<!-- Firebase (compat) -->
<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>

  <style>
    :root{
      /* Komerční banka palette (from publicly listed brand colors) */
      --kb-red: #9e0b0b;   /* primary accent */ /* [1](https://brandfetch.com/kb.cz) */
      --kb-black: #020203; /* primary text */   /* [1](https://brandfetch.com/kb.cz) */
      --kb-gray: #97A6B6;  /* secondary */      /* [1](https://brandfetch.com/kb.cz) */

      --bg: #F6F7F9;
      --card: #ffffff;
      --muted: #5B6470;
      --border: rgba(2,2,3,0.12);
      --shadow: 0 10px 30px rgba(2,2,3,0.10);
      --radius: 18px;
      --radius-sm: 12px;

      --focus: 0 0 0 4px rgba(224,0,0,0.18);
      --tap: 48px;
      --max: 1080px;
    }

    *{ box-sizing: border-box; }
    html, body{ height: 100%; }
    body{
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
background: radial-gradient(1000px 500px at 10% 0%, rgba(150,150,150,0.10), transparent 50%),
            radial-gradient(800px 450px at 90% 10%, rgba(151,166,182,0.22), transparent 55%);
                  var(--bg);
      color: var(--kb-black);
    }

    a{ color: inherit; }

    .wrap{
      max-width: var(--max);
      margin: 0 auto;
      padding: 22px 16px 56px;
    }

    header{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 2px 18px;
    }

    .brand{
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logoMark{
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--kb-red), #ff3b3b);
      box-shadow: 0 10px 22px rgba(120,120,120,0.20);
      display: grid;
      place-items: center;
      color: white;
      flex: 0 0 auto;
    }

    .brand h1{
      margin: 0;
      font-size: 16px;
      line-height: 1.1;
      letter-spacing: 0.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand p{
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions{
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn{
      height: var(--tap);
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--kb-black);
      display: inline-flex;
      gap: 10px;
      align-items: center;
      cursor: pointer;
      font-weight: 650;
      font-size: 14px;
      transition: transform .08s ease, box-shadow .15s ease, border-color .15s ease, background .15s ease;
      user-select: none;
    }
    .btn:hover{
      border-color: rgba(2,2,3,0.18);
      box-shadow: 0 10px 22px rgba(2,2,3,0.08);
      transform: translateY(-1px);
    }
    .btn:active{ transform: translateY(0px) scale(0.99); }
    .btn:focus-visible{ outline: none; box-shadow: var(--focus); }


    /* Ikonové tlačítko (Nastavení) */
.btn.iconOnly{
  width: 42px;          /* velikost tlačítka */
  height: 42px;
  padding: 0;           /* žádný vnitřní padding */
  border-radius: 14px;
  justify-content: center;
  gap: 0;               /* žádná mezera pro text */
}

/* Ikona uvnitř – velikost a zarovnání */
.btn.iconOnly svg{
  width: 20px;
  height: 20px;
}

/* Volitelné: jemně ztlumit barvu ikony v klidu */
.btn.iconOnly{
  color: var(--kb-black);
}

/* Volitelné: lepší feedback na hover (lehce zvýraznit) */
.btn.iconOnly:hover{
  background: rgba(255,255,255,0.92);
}


    
    .btn.primary{
      background: var(--kb-red);
      border-color: transparent;
      color: white;
      box-shadow: 0 10px 22px rgba(120,120,120,0.20);
    }
    .btn.primary:hover{
      background: #ff1f1f;
      box-shadow: 0 10px 22px rgba(120,120,120,0.20);
    }

/* ===== Settings dropdown menu ===== */
.menuAnchor{
  position: relative;
  display: inline-flex;
  align-items: center;
}

/* menu panel */
.menu{
  position: absolute;
  right: 0;
  top: calc(100% + 10px);
  min-width: 220px;
  padding: 8px;
  border-radius: 16px;
  border: 1px solid rgba(2,2,3,0.12);
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 20px 60px rgba(2,2,3,0.18);
  display: none;
  z-index: 80;
}

/* otevřený stav */
.menu.open{
  display: block;
}

/* položka menu */
.menuItem{
  width: 100%;
  border: 0;
  background: transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 12px;
  font-weight: 750;
  color: var(--kb-black);
  text-align: left;
}

.menuItem:hover{
  background: rgba(224,0,0,0.08);
}

.menuItem:active{
  transform: scale(0.99);
}

.menuItem:focus-visible{
  outline: none;
  box-shadow: var(--focus);
}

/* ikony v menu */
.menuItem svg{
  width: 18px;
  height: 18px;
  color: var(--muted);
}
    
    .grid{
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 16px;
      align-items: start;
    }

    @media (max-width: 920px){
      .grid{ grid-template-columns: 1fr; }
    }

    .card{
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    .cardTitle{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .cardTitle h2{
      margin: 0;
      font-size: 15px;
      letter-spacing: 0.2px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(2,2,3,0.10);
      background: rgba(255,255,255,0.8);
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .qrBox{
      display: grid;
      place-items: center;
      padding: 14px 10px 10px;

    #qrcode{

      height: 240px;
      padding: 10px;

    .qrHint{
      margin-top: 12px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .linkRow{
      display:flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .field{
      display:flex;
      flex-direction: column;
      gap: 8px;
    }
    .label{
      font-size: 13px;
      color: var(--muted);
      font-weight: 650;
    }
    .input, textarea{
      width: 100%;
      border: 1px solid rgba(2,2,3,0.14);
      background: rgba(255,255,255,0.88);
      border-radius: 14px;
      padding: 12px 12px;
      font-size: 15px;
      outline: none;
      transition: box-shadow .15s ease, border-color .15s ease;
    }
    textarea{ min-height: 120px; resize: vertical; }
    .input:focus, textarea:focus{

      box-shadow: var(--focus);
    }

    .mutedSmall{
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }

    .questionsHeader{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .questionsHeader h2{
      margin:0;
      font-size: 15px;
      letter-spacing: 0.2px;
    }

    .seg{
      display:flex;
      border: 1px solid rgba(2,2,3,0.12);
      background: rgba(255,255,255,0.7);
      border-radius: 14px;
      overflow: hidden;
    }
    .seg button{

    .list{

      gap: 12px;
    }
    .qText{

      align-items:center;
      gap: 8px;

      border-radius: 999px;
      border: 1px solid rgba(2,2,3,0.10);
      background: rgba(255,255,255,0.72);
      font-weight: 700;
    }

    .likeBtn{
      height: 40px;
      padding: 0 12px;
      border-radius: 14px;
      border: 1px solid rgba(2,2,3,0.12);
      background: rgba(255,255,255,0.75);
      cursor: pointer;
      display:inline-flex;
      align-items:center;
      gap: 10px;
      font-weight: 800;
      transition: transform .08s ease, background .15s ease, border-color .15s ease;
      user-select: none;
      white-space: nowrap;
    }
    .likeBtn:hover{
      border-color: rgba(2,2,3,0.18);
      transform: translateY(-1px);
    }
    .likeBtn:active{ transform: translateY(0px) scale(0.99); }
    .likeBtn:focus-visible{ outline:none; box-shadow: var(--focus); }
    .likeBtn.liked{
      background: rgba(224,0,0,0.10);
      border-color: rgba(224,0,0,0.22);

    .likeCount{

      justify-content:center;

      height: 26px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(2,2,3,0.06);
      font-size: 13px;
      font-weight: 900;
    }

    .empty{
      text-align:center;
      padding: 26px 14px;
      color: var(--muted);
    }

    /* Modal */
    .backdrop{
      position: fixed;
      inset: 0;
      background: rgba(2,2,3,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 50;
    }
    .backdrop.open{ display: flex; }

    .modal{
      width: min(680px, 100%);
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 22px;
      box-shadow: 0 20px 60px rgba(2,2,3,0.35);
      overflow: hidden;
      transform: translateY(6px);
      animation: pop .14s ease-out forwards;
    }
    @keyframes pop{
      to { transform: translateY(0px); }
    }

    .modalHeader{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 16px 10px;
      border-bottom: 1px solid rgba(2,2,3,0.10);
      background: linear-gradient(180deg, rgba(224,0,0,0.08), transparent 70%);
    }
    .modalHeader h3{
      margin: 0;
      font-size: 15px;
      letter-spacing: 0.2px;
    }
    .iconBtn{
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid rgba(2,2,3,0.12);
      background: rgba(255,255,255,0.75);
      display:grid;
      place-items:center;
      cursor:pointer;
    }
    .iconBtn:focus-visible{ outline:none; box-shadow: var(--focus); }

    .modalBody{
      padding: 14px 16px 16px;
      display:grid;
      gap: 14px;
    }

    .row2{
      display:grid;
      grid-template-columns: 1fr 240px;
      gap: 12px;
    }
    @media (max-width: 640px){
      .row2{ grid-template-columns: 1fr; }
    }

    .modalFooter{

      justify-content: flex-end;
      gap: 10px;
      padding: 14px 16px 16px;
      border-top: 1px solid rgba(2,2,3,0.10);
      background: rgba(255,255,255,0.75);
    }

    .error{
      display:none;
      color: #b60000;
      font-weight: 700;
      font-size: 13px;
      gap: 8px;
      align-items:center;
    }
    .error.show{ display:flex; }

    .toast{
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(2,2,3,0.92);
      color: white;
      padding: 12px 14px;

      box-shadow: 0 16px 40px rgba(2,2,3,0.28);

      align-items:center;
      gap: 10px;
      z-index: 60;
      font-weight: 700;
      font-size: 13px;

    .toast.show{ display:flex; }

    footer{
      margin-top: 16px;

    .kbd{

      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.10);
      color: white;
      font-weight: 800;
    }
  </style>
</head>

  <script>

    /**********************
 * Firebase init ()
 **********************/
const firebaseConfig = {
  apiKey: "AIzaSyB2-mELtDFfbB8aSHhml-RtNQLQfyX1HmI",
  authDomain: "qanda-717cd.firebaseapp.com",
  projectId: "qanda-717cd",
  storageBucket: "qanda-717cd.firebasestorage.app",
  messagingSenderId: "696079415742",
  appId: "1:696079415742:web:5c825b45aeb9859fa0a1ef"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const db = firebase.firestore();
console.log("✅ Firebase init OK");
console.log("ProjectId:", firebase.app().options.projectId);
console.log("Firestore ready:", !!db);

/**********************
 * Firestore realtime: načítání dotazů pro všechny
 **********************/
const QUESTIONS_COLLECTION = "questions"; // kolekce ve Firestore

function startRealtimeQuestions(){
  // posloucháme změny v kolekci (realtime)
  db.collection(QUESTIONS_COLLECTION)
    .orderBy("createdAt", "desc")
    .onSnapshot((snapshot) => {
      state.questions = snapshot.docs.map(doc => {
        const d = doc.data() || {};
        const ts = d.createdAt;

        // createdAt může být Firestore Timestamp nebo číslo
        const createdAt =
          ts && typeof ts.toMillis === "function" ? ts.toMillis()
          : (typeof ts === "number" ? ts : Date.now());

        return {
          id: doc.id,
          text: d.text || "",
          name: d.name || "anonymně",
          likes: typeof d.likes === "number" ? d.likes : 0,
          createdAt
        };
      });

      render(); // přerenderuje UI
    }, (err) => {
      console.error("❌ Firestore listener error:", err);
      toast("Firestore: chyba čtení (pravděpodobně rules) ❌");
    });
}
    
    /**********************
     * MVP storage + state
     **********************/
    const STORAGE_KEY = "qna_questions_v1";
    const LIKES_KEY   = "qna_likes_v1";
    const CLIENT_KEY  = "qna_client_id_v1";

    const state = {
      sort: "top", // "top" | "new"
      questions: [],
      likedMap: {}, // { [questionId]: true }
      clientId: null
    };

    const $ = (sel) => document.querySelector(sel);

    // Try to keep multiple tabs in sync (same device).
    const bc = ("BroadcastChannel" in window) ? new BroadcastChannel("qna_live_channel") : null;
    if (bc) {
      bc.onmessage = (e) => {
        if (e?.data?.type === "sync") {
          loadAll();
          render();
        }
      };
    }

    function uid() {
      if (crypto && crypto.randomUUID) return crypto.randomUUID();
      // fallback
      return "id-" + Math.random().toString(16).slice(2) + "-" + Date.now().toString(16);
    }

    function loadAll(){

     // } catch {
     //   state.questions = [];
    //  }
    }

    function saveQuestions(){

    /**********************
     * URL / QR generation
     **********************/
function participantUrl(){
  // Jedna společná URL pro všechny (bez režimů)
  const u = new URL(window.location.href);
  u.searchParams.delete("ask"); // když by tam někdy zůstal
  return u.toString();
}

   

    function renderQr(){
      const el = $("#qrcode");
      el.innerHTML = "";
      new QRCode(el, {
        text: participantUrl(),
        width: 220,
        height: 220,
        colorDark: "#020203",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M
      });
    }

    /**********************
     * Rendering
     **********************/
    function formatTime(ts){
      const d = new Date(ts);
      return d.toLocaleString("cs-CZ", { day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit" });
    }

    function sortedQuestions(){
      const qs = [...state.questions];
      if (state.sort === "new") {
        qs.sort((a,b) => b.createdAt - a.createdAt);
      } else {
        // top = likes desc, then newest
        qs.sort((a,b) => (b.likes - a.likes) || (b.createdAt - a.createdAt));
      }
      return qs;
    }

    function render(){
      const list = $("#list");
      const qs = sortedQuestions();
      $("#count").textContent = `(${qs.length})`;

      if (!qs.length){
        list.innerHTML = `
          <div class="empty">
            <div style="display:grid; place-items:center; gap:10px;">
              <div style="width:52px;height:52px;border-radius:18px;background:rgba(224,0,0,0.10);display:grid;place-items:center;">
                <i data-lucide="sparkles"></i>
              </div>
              <div style="font-weight:800;color:var(--kb-black);">Zatím žádné dotazy</div>
              <div>Povzbuď publikum: „Načtěte QR a napište otázku“</div>
            </div>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      list.innerHTML = qs.map(q => {
        const liked = !!state.likedMap[q.id];
        const safeName = (q.name && q.name.trim()) ? q.name.trim() : "anonymně";
        const safeText = q.text || "";
        return `
          <article class="q" data-id="${q.id}">
            <div class="qTop">
              <p class="qText">${escapeHtml(safeText)}</p>
              <button class="likeBtn ${liked ? "liked":""}" data-like="${q.id}" type="button" aria-label="Lajknout otázku">
                <i data-lucide="${liked ? "heart-handshake" : "heart"}"></i>
                <span class="likeCount">${q.likes}</span>
              </button>
            </div>
            <div class="qMeta">
              <span class="nameBadge"><i data-lucide="user"></i> ${escapeHtml(safeName)}</span>
              <span class="dot">•</span>
              <span><i data-lucide="calendar-clock"></i> ${formatTime(q.createdAt)}</span>
            </div>
          </article>
        `;
      }).join("");

      lucide.createIcons();

      // hook up like buttons
      document.querySelectorAll("[data-like]").forEach(btn => {
        btn.addEventListener("click", () => {
          const id = btn.getAttribute("data-like");
          likeQuestion(id);
        }, { passive: true });
      });
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
/**********************
 * Likes (Firestore realtime)
 **********************/
async function likeQuestion(id){
  const alreadyLiked = !!state.likedMap[id];

  try {
    // pokud už byl like, tak ho odebereme (-1), jinak přidáme (+1)
    const delta = alreadyLiked ? -1 : 1;

    // (volitelné) lokální ochrana proti záporným likes v UI
    const q = state.questions.find(x => x.id === id);
    if (alreadyLiked && q && q.likes <= 0) {
      // už je 0 → nemá smysl odečítat
      delete state.likedMap[id];
      saveLikes();
      render();
      return;
    }

    // Firestore: atomický increment o +1 / -1
    await db.collection(QUESTIONS_COLLECTION).doc(id).update({
      likes: firebase.firestore.FieldValue.increment(delta)
    });

    // Lokální toggle stav
    if (alreadyLiked) {
      delete state.likedMap[id];
      toast("Like odebrán 💔");
    } else {
      state.likedMap[id] = true;
      toast("Like přidán ❤️");
    }
    saveLikes();

    // Okamžitý repaint (realtime listener to stejně dorovná)
    render();

  } catch (e) {
    console.error("❌ Firestore like toggle error:", e);
    toast("Nepodařilo se změnit like (pravděpodobně rules) ❌");
  }
}
    function addQuestion(text, name){
      const q = {
        id: uid(),
        text: text.trim(),
        name: (name || "").trim() || "anonymně",
        likes: 0,
        createdAt: Date.now()
      };
      state.questions.unshift(q);
      saveQuestions();
    }

function openMenu(){
  if (!settingsMenu || !openSettingsBtn) return;
  settingsMenu.classList.add("open");

  openSettingsBtn.setAttribute("aria-expanded", "true");
}

function closeMenu(){

  settingsMenu.classList.remove("open");
  settingsMenu.setAttribute("aria-hidden", "true");
  openSettingsBtn.setAttribute("aria-expanded", "false");
}

function toggleMenu(){
  if (!settingsMenu) return;
  settingsMenu.classList.contains("open") ? closeMenu() : openMenu();
}

// Klik na ⚙️
openSettingsBtn?.addEventListener("click", (e) => {
  e.stopPropagation();
  toggleMenu();
});

// Klik do menu – ať se nezavře hned document handlerem
settingsMenu?.addEventListener("click", (e) => {
  e.stopPropagation();
});

// Klik mimo menu → zavřít
document.addEventListener("click", () => {
  if (settingsMenu?.classList.contains("open")) closeMenu();
});

// Esc → zavřít menu (nebude se mlátit s modálem)
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && settingsMenu?.classList.contains("open")) {
    closeMenu();
  }
});

/**********************
 * Reset session (mazání dat)
 **********************/
async function deleteAllQuestions(){
  // smaže všechny docs v kolekci QUESTIONS_COLLECTION po dávkách (<=500)
  const col = db.collection(QUESTIONS_COLLECTION);
  let totalDeleted = 0;

  while (true) {
    const snap = await col.limit(500).get();
    if (snap.empty) break;

    const batch = db.batch();
    snap.docs.forEach(doc => batch.delete(doc.ref));
    await batch.commit();

    totalDeleted += snap.size;

    // pojistka proti nekonečné smyčce (teoreticky při paralelním zápisu)
    if (snap.size < 500) break;
  }

  return totalDeleted;
}

async function resetSession(){
  const ok = window.confirm(
    "Opravdu chceš RESET SESSION?\n\n" +
    "Smaže to všechny dotazy ve Firestore (kolekce: " + QUESTIONS_COLLECTION + ").\n" +
    "Tuto akci nelze vzít zpět."
  );
  if (!ok) return;

  try {
    // UI: zablokuj tlačítko během resetu
    if (resetSessionBtn) {
      resetSessionBtn.disabled = true;
      resetSessionBtn.style.opacity = "0.6";
      resetSessionBtn.style.cursor = "not-allowed";
    }

    toast("Mažu dotazy… ⏳");

    const deleted = await deleteAllQuestions();

    // lokální reset likes (a případně i state)
    state.likedMap = {};
    saveLikes();

    // Pokud bys chtěl čistit i CLIENT_ID, odkomentuj:
    // localStorage.removeItem(CLIENT_KEY);

    toast(`Reset hotov ✅ (smazáno: ${deleted})`);

    // render() není nutný – onSnapshot to UI překreslí samo.
    // Ale nevadí ho zavolat pro okamžitou odezvu:
    render();

  } catch (e) {
    console.error("❌ Reset session error:", e);
    toast("Reset se nepovedl (pravděpodobně Firestore rules) ❌");
  } finally {
    if (resetSessionBtn) {
      resetSessionBtn.disabled = false;
      resetSessionBtn.style.opacity = "";
      resetSessionBtn.style.cursor = "";
    }
  }
}

// Klik na "Reset session"
resetSessionBtn?.addEventListener("click", async () => {
  closeMenu();
  await resetSession();
});
    
    function openModal(){
      errorEl.classList.remove("show");
      backdrop.classList.add("open");
      backdrop.setAttribute("aria-hidden", "false");
      // focus
      window.setTimeout(() => qInput.focus(), 50);
    }

    function closeModal(){
      backdrop.classList.remove("open");
      backdrop.setAttribute("aria-hidden", "true");
      qInput.value = "";
      nameInput.value = "";
      charCount.textContent = `0 / 280`;
    }

    function validate(){
      const text = qInput.value.trim();
      if (!text) {
        errorText.textContent = "Vyplň prosím dotaz.";
        errorEl.classList.add("show");
        qInput.focus();
        return false;
      }
      if (text.length < 3){
        errorText.textContent = "Dotaz je moc krátký – zkus to prosím upřesnit.";
        errorEl.classList.add("show");
        qInput.focus();
        return false;
      }
      errorEl.classList.remove("show");
      return true;
    }
function addQuestionToFirestore(text, name){
  return db.collection(QUESTIONS_COLLECTION).add({
    text: text.trim(),
    name: (name || "").trim() || "anonymně",
    likes: 0,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
}
async function onSave(){
  if (!validate()) return;

  try {
    await addQuestionToFirestore(qInput.value, nameInput.value);
    closeModal();
    toast("Dotaz uložen ✅");
    // render() není potřeba – onSnapshot si dotaz natáhne a UI překreslí sám
  } catch (e) {
    console.error("❌ Firestore write error:", e);
    toast("Nepodařilo se uložit dotaz (pravděpodobně rules) ❌");
  }
}

      if (backdrop.classList.contains("open") && (e.ctrlKey || e.metaKey) && e.key === "Enter") onSave();
    });

    qInput.addEventListener("input", () => {
      charCount.textContent = `${qInput.value.length} / 280`;
    });

    openAskBtn?.addEventListener("click", openModal);
    closeBtn.addEventListener("click", closeModal);
    cancelBtn.addEventListener("click", closeModal);

    // QR click opens modal too
    $("#qrcode").addEventListener("click", openModal);
    $("#qrcode").addEventListener("keydown", (e) => {

    });

    // Sorting

      state.sort = "top";
      $("#sortTop").classList.add("active");
      $("#sortNew").classList.remove("active");
      render();
    });

    $("#sortNew").addEventListener("click", () => {
      state.sort = "new";
      $("#sortNew").classList.add("active");
      $("#sortTop").classList.remove("active");
      render();
    });

  // "Položit dotaz" pod QR → otevře modal
openParticipantBtn?.addEventListener("click", (e) => {
  e.preventDefault();
  openModal();
});

    copyLinkBtn.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(participantUrl());
        toast("Odkaz zkopírován 📎");
      } catch {
        // fallback
        const tmp = document.createElement("textarea");
        tmp.value = participantUrl();
        document.body.appendChild(tmp);
        tmp.select();
        document.execCommand("copy");
        tmp.remove();
        toast("Odkaz zkopírován 📎");
      }
    });
